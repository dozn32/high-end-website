<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche Museum</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <button id="toggle">🌙</button>

  <h1>Porsche</h1>

  <nav>
    <a href="#home"><i class="fa-solid fa-house"></i></a>
    <a href="#story"><i class="fa-solid fa-clock"></i></a>
    <a href="#cars"><i class="fa-solid fa-car"></i></a>
  </nav>
</header>

<section id="home" class="hero">
  <div class="hero-content reveal">
    <h2>Porsche Museum</h2>
    <p>A journey through speed & innovation</p>
  </div>
</section>

<section id="story" class="section">
  <h2 class="reveal">The Evolution</h2>

  <div class="timeline">
    <div class="block reveal">
      <h3>1931</h3>
      <p>Founded by Ferdinand Porsche</p>
    </div>

    <div class="block reveal">
      <h3>1964</h3>
      <p>Porsche 911 introduced</p>
    </div>

    <div class="block reveal">
      <h3>2020</h3>
      <p>Electric era with Taycan</p>
    </div>
  </div>
</section>

<section id="cars" class="section dark">
  <h2 class="reveal">Iconic Cars</h2>

  <div class="gallery">
    <div class="card reveal">
      <img src="images/911.jpg">
      <h3>Porsche 911</h3>
    </div>

    <div class="card reveal">
      <img src="images/taycan.jpg">
      <h3>Porsche Taycan</h3>
    </div>

    <div class="card reveal">
      <img src="images/cayenne.jpg">
      <h3>Porsche Cayenne</h3>
    </div>
  </div>
</section>

<footer>
  <p>© Porsche Museum Experience</p>
</footer>

<script src="script.js"></script>
</body>
</html>
